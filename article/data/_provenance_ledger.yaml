# Article quantitative-claim provenance ledger
# Generated 2026-06-04 for the manuscript submission rewrite.
#
# Lists every quantitative claim in main-jucs.tex with its source data and
# verification status against Pass A (stock 24-CU 0.20.0) and Pass B
# (patched 40-CU 0.20.0). Each entry has fields:
#   article_loc:    section/table/figure
#   claim:          the quantitative statement
#   data_source:    JSON file or telemetry CSV that backs it
#   collected_at:   when data was collected (CU mode + Ollama version)
#   pass_match:     CONFIRMED | MISLABELLED | PENDING (Pass C/D/E will resolve)
#   action:         KEEP | REPLACE-FROM-PASS-A | REPLACE-FROM-PASS-D | RETAIN-WITH-CAVEAT
#   notes:          any extra context
#
# 2026-06-13 16-GiB CLEAN RE-SWEEP (supersedes the 12-GiB-cap erratum):
#   The filled-context tables (Table 3 context_scaling, Table w5_followup) were
#   re-collected at the verified 16-GiB pool (ttm.pages_limit=4194304, confirmed
#   live across reboot) with a curl-hard-deadline n=3 harness
#   (benchmarks/bench-16gib-nsweep-v2.py). These 16-GiB medians are now the
#   canonical values in the article; the article no longer carries any 12-GiB-cap
#   erratum. Source data: benchmarks/results-16gib-resweep/nsweep-*.json.
#   Cap-immune tables (gen_speed 4K, stat_validation, multineedle, granite-extreme,
#   kv_longctx, cold-start, roofline, quality battery) were NOT re-run: their
#   working sets never approached the 12-GiB ceiling, so their values are
#   16-GiB-representative as measured. qwen3.5-27b quality re-measured at 16 GiB
#   = 53% (8/15), source 27b-quality-16gib.json (was "0%/cap-load-failure").
#
# 2026-06-15 64K-TIMEOUT CELL RECONCILIATION (Table 5 context_scaling):
#   Table 5 reports qwen3:8b and qwen3:14b at 64K filled as "timeout". In the
#   canonical resweep files this surfaces as instability right at the 16-GB
#   physical envelope, not a clean budget cut: nsweep-qwen3-8b.json's 64K cell
#   recorded ok=1/3 (one completing run at 836 s / 10.9 t/s plus a timeout and an
#   HTTP500), and nsweep-qwen3-14b.json's climb stopped at 32K (no 64K cell) on
#   the GTT high-water guard. Both 64K cells were re-confirmed non-completing on
#   2026-06-15: under the article's stated maximum per-tier budget (6046 s wall
#   cap, curl --max-time, verified-stock 24-CU, pages_limit=4194304) each ran the
#   FULL 6046 s and still timed out, with free RAM at 1.06 GiB (qwen3:8b) and
#   0.41 GiB (qwen3:14b) — prefill thrashing against the physical pool. The lone
#   836 s qwen3:8b completion is therefore an envelope-instability outlier, and
#   the "timeout" label is the correct sustained-measurement characterisation.
#   Confirmation artifacts: benchmarks/results-64k-envelope-confirm/.

